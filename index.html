<!-- 구글 스프레드 시트 연동은 config.js 파일에서 -->

<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>바당타임 - 실시간 안전 대시보드</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="js/tailwind-config.js"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .pulse-live { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
  .tap-highlight-transparent { -webkit-tap-highlight-color: transparent; }
  .skeleton { background: linear-gradient(90deg,#ededf2 25%,#e2e2e6 37%,#ededf2 63%); background-size:400% 100%; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
</style>
</head>
<body class="bg-surface-container-low text-on-surface select-none">
<!-- Top Bar -->
<nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md px-margin-mobile py-4 flex justify-between items-center border-b border-outline-variant/30">
  <div class="flex items-center gap-2.5">
    <img src="favicon.png" alt="바당타임 로고" class="w-9 h-9 rounded-xl object-cover shadow-sm"/>
    <div class="flex flex-col">
      <span class="text-headline-lg-mobile font-black text-primary tracking-tight leading-none">바당타임</span>
      <span class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest">Coastal Safety Intelligence</span>
    </div>
  </div>
</nav>

<main class="px-margin-mobile md:px-8 pt-5 pb-32 max-w-md md:max-w-6xl mx-auto space-y-6">
  <!-- Section 1: 오늘의 해안 안전 요약 -->
  <section class="bg-white rounded-[28px] p-6 shadow-sm border border-outline-variant/20">
    <div class="flex justify-between items-start mb-6">
      <h2 class="text-title-md text-primary">오늘의 해안 안전 요약</h2>
      <div class="flex items-center gap-1.5 bg-surface-container px-3 py-1 rounded-full">
        <span class="w-2 h-2 bg-error rounded-full pulse-live"></span>
        <span class="text-[11px] text-on-surface-variant font-bold tracking-tighter">AI 분석 중</span>
      </div>
    </div>
    <!-- Major Status -->
    <div id="summary-status" class="flex items-center gap-4 mb-8 bg-surface-container-lowest p-5 rounded-2xl border border-outline-variant/10">
      <div class="bg-warning-yellow/10 p-4 rounded-2xl">
        <span class="material-symbols-outlined text-warning-yellow text-[48px]" style="font-variation-settings: 'FILL' 1;">warning</span>
      </div>
      <div>
        <div class="text-[14px] font-bold text-on-surface-variant mb-1">통합 안전 지수</div>
        <div id="summary-headline" class="text-[24px] font-black text-warning-yellow leading-none">분석 중…</div>
        <div class="text-[12px] text-outline mt-1 font-medium italic">기관 데이터 기반 실시간 분석</div>
      </div>
    </div>
    <!-- Metrics Grid -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div class="bg-surface-container-low p-4 rounded-2xl">
        <div class="flex items-center gap-2 mb-2 text-on-surface-variant">
          <span class="material-symbols-outlined text-[18px]">waves</span>
          <span class="text-[12px] font-bold">현재 파고</span>
        </div>
        <div id="m-wave" class="text-[20px] font-black text-primary">– m</div>
      </div>
      <div class="bg-surface-container-low p-4 rounded-2xl">
        <div class="flex items-center gap-2 mb-2 text-on-surface-variant">
          <span class="material-symbols-outlined text-[18px]">air</span>
          <span class="text-[12px] font-bold">풍속</span>
        </div>
        <div id="m-wind" class="text-[20px] font-black text-primary">– m/s</div>
      </div>
      <div class="bg-surface-container-low p-4 rounded-2xl">
        <div class="flex items-center gap-2 mb-2 text-on-surface-variant">
          <span class="material-symbols-outlined text-[18px]">water_drop</span>
          <span class="text-[12px] font-bold">현재 물때</span>
        </div>
        <div id="m-tide" class="text-[20px] font-black text-primary">–</div>
      </div>
      <div id="m-advisory-box" class="bg-error-container/20 p-4 rounded-2xl border border-error/10">
        <div class="flex items-center gap-2 mb-2 text-error">
          <span class="material-symbols-outlined text-[18px]">campaign</span>
          <span class="text-[12px] font-bold">기상특보</span>
        </div>
        <div id="m-advisory" class="text-[15px] font-black text-error">확인 중</div>
      </div>
    </div>
  </section>

  <!-- Search Bar -->
  <div class="relative">
    <div class="flex items-center bg-white rounded-2xl px-5 py-4 shadow-sm border border-outline-variant/30 focus-within:border-primary-container focus-within:ring-4 focus-within:ring-primary-container/10 transition-all">
      <span class="material-symbols-outlined text-primary mr-3 font-bold">search</span>
      <input id="search" class="bg-transparent border-none focus:ring-0 w-full text-body-md placeholder:text-outline/60 p-0 font-medium" placeholder="해안 명칭 또는 대피소 검색" type="text"/>
      <span class="material-symbols-outlined text-on-surface-variant/50 ml-2">mic</span>
    </div>
  </div>

  <!-- Category Tabs -->
  <div id="tabs" class="flex gap-2 overflow-x-auto no-scrollbar py-2">
    <button data-filter="safe" class="tab flex-none px-6 py-3 bg-primary text-white rounded-full text-[14px] font-black shadow-md">오늘 입수 가능</button>
    <button data-filter="caution" class="tab flex-none px-6 py-3 bg-white text-on-surface-variant border border-outline-variant/30 rounded-full text-[14px] font-bold">주의 지역</button>
    <button data-filter="danger" class="tab flex-none px-6 py-3 bg-white text-on-surface-variant border border-outline-variant/30 rounded-full text-[14px] font-bold">출입 금지</button>
  </div>

  <!-- Coast Cards -->
  <section class="space-y-4">
    <div class="flex justify-between items-center px-1">
      <h2 class="text-title-md text-primary"><span id="coast-title">현재 입수 가능 지역</span> <span id="coast-count" class="text-on-surface-variant font-medium text-body-md">(…)</span></h2>
      <span id="update-stamp" class="text-[11px] text-outline font-bold">업데이트 중</span>
    </div>
    <div id="coast-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
  </section>
</main>

<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-white/95 backdrop-blur-xl shadow-[0_-8px_24px_rgba(0,0,0,0.08)] border-t border-outline-variant/20">
  <a href="index.html" class="flex flex-col items-center justify-center gap-1 flex-1 text-primary tap-highlight-transparent">
    <span class="material-symbols-outlined text-[26px]" style="font-variation-settings: 'FILL' 1;">home</span>
    <span class="text-[11px] font-black">홈</span>
  </a>
  <a href="map.html" class="flex flex-col items-center justify-center gap-1 flex-1 text-on-surface-variant/60 tap-highlight-transparent">
    <span class="material-symbols-outlined text-[26px]">map</span>
    <span class="text-[11px] font-bold">지도</span>
  </a>
  <a href="ai.html" class="flex flex-col items-center justify-center gap-1 flex-1 text-on-surface-variant/60 tap-highlight-transparent">
    <span class="material-symbols-outlined text-[26px]">auto_awesome</span>
    <span class="text-[11px] font-bold">AI 추천</span>
  </a>
</nav>

<script src="js/config.js"></script>
<script src="js/common.js"></script>
<script src="js/api.js"></script>
<script src="js/safety.js"></script>
<script src="js/dashboard.js?v=2"></script>
</body>
</html>
