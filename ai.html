<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>바당타임 - 실시간 입수 추천</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="js/tailwind-config.js"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Pretendard', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .chat-bubble-ai { position: relative; background: #fff; border-bottom-left-radius: 4px; }
  .gradient-mesh { background-color: #f9f9fd; background-image: radial-gradient(at 0% 0%, rgba(154,225,255,0.15) 0, transparent 50%), radial-gradient(at 100% 100%, rgba(0,65,106,0.05) 0, transparent 50%); }
  .coastal-card { transition: transform .2s cubic-bezier(.4,0,.2,1), box-shadow .2s ease; }
  .coastal-card:active { transform: scale(.98); }
</style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<header class="flex justify-between items-center px-4 h-14 sticky top-0 z-50 bg-surface-container-lowest/80 backdrop-blur-md border-b border-outline-variant/30">
  <a href="index.html" class="font-title-md text-primary font-bold flex items-center gap-1.5"><span class="material-symbols-outlined text-[20px]">arrow_back</span><img src="favicon.png" alt="바당타임 로고" class="w-7 h-7 rounded-lg object-cover"/>바당타임</a>
</header>

<main class="flex-grow flex flex-col items-center gradient-mesh pb-40">
  <div class="w-full max-w-md md:max-w-3xl px-4 py-6">
    <!-- AI Analysis Header -->
    <div class="mb-8">
      <div class="flex items-center gap-3 mb-3">
        <span class="flex h-3 w-3 relative">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-secondary opacity-75"></span>
          <span class="relative inline-flex rounded-full h-3 w-3 bg-secondary"></span>
        </span>
        <div class="flex flex-col">
          <span class="text-[10px] font-label-sm text-secondary uppercase tracking-widest font-bold">AI 실시간 분석 완료</span>
          <span class="text-[9px] text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-[10px]">cloud</span> <span id="source-label">기상청 데이터 연동 중</span></span>
        </div>
      </div>
      <h1 class="font-headline-lg-mobile text-primary text-2xl leading-tight">실시간 입수 최적지 추천</h1>
      <div class="mt-4 bg-primary/5 border border-primary/10 p-4 rounded-2xl">
        <p id="ai-quote" class="text-primary font-semibold text-lg leading-snug">"분석 중…"</p>
        <p id="ai-basis" class="text-on-surface-variant text-sm mt-2">기준: 실시간 조위·풍향·수온</p>
      </div>
    </div>

    <div class="space-y-6">
      <div class="flex gap-3 items-start">
        <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center flex-shrink-0"><span class="material-symbols-outlined text-white text-lg" style="font-variation-settings:'FILL' 1;">auto_awesome</span></div>
        <div class="chat-bubble-ai p-4 rounded-2xl shadow-sm border border-outline-variant/50 max-w-[85%] bg-white"><p class="text-sm text-on-surface leading-relaxed">현재 해상 기상 데이터를 바탕으로 분석한 결과입니다. 안전한 입수를 위해 아래 추천 명소를 확인해주세요.</p></div>
      </div>

      <div class="space-y-5">
        <!-- Best Spot -->
        <div id="best-card" class="coastal-card bg-surface-container-lowest rounded-2xl overflow-hidden shadow-md border-2 border-secondary/20"></div>
        <!-- Danger Spot -->
        <div id="danger-card" class="coastal-card bg-error-container/5 rounded-2xl overflow-hidden border border-error/30 p-5 bg-white"></div>
      </div>

      <div class="flex gap-3 items-start">
        <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center flex-shrink-0"><span class="material-symbols-outlined text-white text-lg" style="font-variation-settings:'FILL' 1;">auto_awesome</span></div>
        <div class="chat-bubble-ai p-4 rounded-2xl shadow-sm border border-outline-variant/50 max-w-[85%] bg-white"><p class="text-sm text-on-surface leading-relaxed">다른 해변의 실시간 안전 상태가 궁금하신가요? 아래에 물어보시면 순위를 다시 알려드립니다.</p></div>
      </div>

      <!-- 전체 순위 (질문 답변 영역) -->
      <div id="ranking" class="space-y-2"></div>
    </div>
  </div>
</main>

<!-- Input -->
<div class="fixed bottom-16 left-0 w-full p-4 bg-white/80 backdrop-blur-xl border-t border-outline-variant/30 z-40">
  <div class="relative max-w-md md:max-w-3xl mx-auto">
    <input id="ai-input" class="w-full h-14 pl-12 pr-24 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary transition-all text-base text-on-surface placeholder:text-on-surface-variant shadow-inner" placeholder="다른 해변 입수 가능 여부 물어보기…" type="text"/>
    <div class="absolute left-4 top-1/2 -translate-y-1/2"><span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings:'FILL' 1;">auto_awesome</span></div>
    <div class="absolute right-2 top-1/2 -translate-y-1/2 flex gap-1">
      <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant"><span class="material-symbols-outlined text-2xl">mic</span></button>
      <button id="ai-send" class="bg-primary text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md"><span class="material-symbols-outlined text-xl">send</span></button>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-white/95 backdrop-blur-xl shadow-[0_-8px_24px_rgba(0,0,0,0.08)] border-t border-outline-variant/20">
  <a href="index.html" class="flex flex-col items-center justify-center gap-1 flex-1 text-on-surface-variant/60"><span class="material-symbols-outlined text-[26px]">home</span><span class="text-[11px] font-bold">홈</span></a>
  <a href="map.html" class="flex flex-col items-center justify-center gap-1 flex-1 text-on-surface-variant/60"><span class="material-symbols-outlined text-[26px]">map</span><span class="text-[11px] font-bold">지도</span></a>
  <a href="ai.html" class="flex flex-col items-center justify-center gap-1 flex-1 text-primary"><span class="material-symbols-outlined text-[26px]" style="font-variation-settings:'FILL' 1;">auto_awesome</span><span class="text-[11px] font-black">AI 추천</span></a>
</nav>

<script src="js/config.js"></script>
<script src="js/common.js"></script>
<script src="js/api.js"></script>
<script src="js/safety.js"></script>
<script src="js/ai.js"></script>
</body>
</html>
